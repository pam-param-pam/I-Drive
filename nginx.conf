worker_processes auto;

events {
    worker_connections 2048;
}

http {
    proxy_cache_path /var/cache/nginx
        levels=1:2
        keys_zone=thumbnail_cache:50m
        max_size=5g
        inactive=365d
        use_temp_path=off;

    #
    # Rate limiting
    #

    limit_req_zone $binary_remote_addr zone=api_rate:10m rate=20r/s;
    limit_req_zone $binary_remote_addr zone=stream_rate:10m rate=2r/s;

    limit_conn_zone $binary_remote_addr zone=conn_limit_per_ip:10m;

    #
    # Websocket upgrade helper
    #

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    upstream backend_upstream {
        server backend:8000;
        keepalive 32;
    }

    server {
        listen 80;
        charset utf-8;

        access_log /var/log/nginx/access.log;
        error_log  /var/log/nginx/error.log;

        #
        # Global limits
        #

#         limit_conn conn_limit_per_ip 40;

        #
        # Healthcheck
        #

        location = /healthcheck {
            access_log off;

            add_header Content-Type text/plain;

            return 200 'Nginx is healthy';
        }

        #
        # Thumbnail streaming cache
        #
        # Matches:
        # /api/files/<file_id>/thumbnail/<thumbnail_id>/stream
        #

        location ~ ^/api/files/[^/]+/thumbnail/[^/]+/stream$ {
#             limit_req zone=api_rate burst=40 nodelay;

            rewrite ^/api(/.*)$ $1 break;

            proxy_cache thumbnail_cache;

            proxy_cache_methods GET;

            proxy_cache_valid 200 365d;
            proxy_cache_valid 404 1m;

            proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;

            proxy_cache_key "$scheme$request_method$host$uri";

            proxy_cache_lock on;
            proxy_cache_background_update on;

            add_header X-Cache-Status $upstream_cache_status always;

            proxy_pass http://backend_upstream;

            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
#
#         #
#         # Other stream endpoints
#         #
#
        location ~ /stream$ {
            limit_req zone=stream_rate burst=10 nodelay;
            limit_conn conn_limit_per_ip 5;
            limit_conn_status 429;
            error_page 429 /too_many_connections;

            rewrite ^/api(/.*)$ $1 break;
            proxy_pass http://backend_upstream;

            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # Important for real streaming
            proxy_buffering off;
        }

        #
        # General API
        #

        location /api/ {
            proxy_pass http://backend_upstream/;

            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        #
        # Static frontend assets
        #

        location ~* \.(js|css)$ {
            root /var/www/idrive/frontend;

            include /etc/nginx/mime.types;
            default_type application/octet-stream;

            expires 1y;

            add_header Cache-Control "public, immutable";
        }

        #
        # SPA
        #

        location / {
            root /var/www/idrive/frontend;

            try_files $uri $uri/ /index.html;

            include /etc/nginx/mime.types;
            default_type application/octet-stream;

            add_header Cache-Control "no-cache";
        }


        location = /too_many_connections {
            internal;

            default_type application/json;

            add_header Retry-After 30 always;

            return 429 '{"error":"errors.nginxError", "details": "Too many concurrent streams from this IP", "code": 429}';
        }

    }
}